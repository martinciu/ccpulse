version: "2"

run:
  go: "1.25"
  tests: true
  concurrency: 4
  timeout: 5m

linters:
  default: none
  enable:
    # correctness
    - govet
    - staticcheck
    - unused
    - errcheck
    - ineffassign
    # smells / style
    - gocritic
    - revive
    - unparam
    # complexity / refactor candidates
    - gocyclo
    - gocognit
    - nestif
    - funlen
    - dupl
    # modernization (auto-fixable)
    - modernize
    - intrange
    - usestdlibvars
    - perfsprint
    # regression guards (added in #353)
    - bodyclose    # HTTP response bodies must be closed (defer resp.Body.Close())
    - errorlint    # idiomatic error handling (errors.Is/As, %w)
    - misspell     # typos in comments, strings, identifiers
    # security (added in #354)
    - gosec        # security: credentials, perms, SQL, paths, subprocess

  settings:
    errcheck:
      check-type-assertions: true
    gocyclo:
      min-complexity: 13
    gocognit:
      min-complexity: 30
    funlen:
      lines: 120
      statements: 80
    dupl:
      threshold: 100
    nolintlint:
      require-explanation: true
      require-specific: true
    revive:
      rules:
        - name: exported
        - name: package-comments
    gosec:
      excludes:
        - G104  # duplicates errcheck — same f.Close() / WriteFile sites
        - G304  # CLI legitimately reads user-provided paths

  exclusions:
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocyclo
          - gocognit
          - dupl
          - funlen
          - nestif
          - revive
          - gocritic
          - gosec
      - path: ^scripts/
        linters:
          - gosec        # seedyear PRNG (G404), seed_dev_test subprocesses (G204)

formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true
