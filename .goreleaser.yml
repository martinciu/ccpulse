version: 2
project_name: ccpulse
before:
  hooks:
    - sh -c 'mkdir -p completions && go run ./cmd/ccpulse completion bash > completions/ccpulse.bash'
    - sh -c 'go run ./cmd/ccpulse completion zsh  > completions/_ccpulse'
    - sh -c 'go run ./cmd/ccpulse completion fish > completions/ccpulse.fish'
builds:
  - id: ccpulse
    main: ./cmd/ccpulse
    binary: ccpulse
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .Date }}
      - -X main.buildChannel=release
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - completions/*
checksum:
  name_template: "checksums.txt"
release:
  draft: false
