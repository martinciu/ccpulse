version: 2
project_name: ccpulse
before:
  hooks:
    - sh -c 'mkdir -p completions && go run ./cmd/ccpulse completion bash > completions/ccpulse.bash'
    - sh -c 'go run ./cmd/ccpulse completion zsh  > completions/_ccpulse'
    - sh -c 'go run ./cmd/ccpulse completion fish > completions/ccpulse.fish'
builds:
  - id: ccpulse
    main: ./cmd/ccpulse
    binary: ccpulse
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .Date }}
      - -X main.buildChannel=release
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - completions/*
nfpms:
  - id: ccpulse-pkg
    package_name: ccpulse
    vendor: Marcin Ciunelis
    homepage: https://github.com/martinciu/ccpulse
    maintainer: Marcin Ciunelis <marcin.ciunelis@gmail.com>
    description: Native Go TUI dashboard for Claude Code usage
    license: MIT
    formats: [deb, rpm]
    bindir: /usr/bin
    contents:
      - src: ./completions/ccpulse.bash
        dst: /usr/share/bash-completion/completions/ccpulse
      - src: ./completions/_ccpulse
        dst: /usr/share/zsh/site-functions/_ccpulse
      - src: ./completions/ccpulse.fish
        dst: /usr/share/fish/vendor_completions.d/ccpulse.fish
brews:
  - name: ccpulse
    repository:
      owner: martinciu
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/martinciu/ccpulse
    description: Native Go TUI dashboard for Claude Code usage
    license: MIT
    install: |
      bin.install "ccpulse"
      bash_completion.install "completions/ccpulse.bash" => "ccpulse"
      zsh_completion.install "completions/_ccpulse"
      fish_completion.install "completions/ccpulse.fish"
    test: |
      assert_match version.to_s, shell_output("#{bin}/ccpulse version")
      system "#{bin}/ccpulse", "--help"
checksum:
  name_template: "checksums.txt"
release:
  draft: false
