# ccpulse — tmux status-right integration
#
# Adds a "5h X% · 7d Y% [⚠]" segment to the right side of the tmux status
# bar, refreshed every 30 seconds. The warning glyph appears when the
# current burn rate is projected to overshoot the 5h limit before reset.
#
# Setup
# -----
# In your ~/.tmux.conf:
#   source-file /path/to/ccpulse/contrib/tmux/ccpulse.conf
# Then reload tmux: `tmux source-file ~/.tmux.conf` (or kill the server).
#
# Requirements
# ------------
# - `ccpulse` on PATH
# - `jq` on PATH (brew install jq)
#
# Refresh cadence
# ---------------
# 30 seconds. The 5h and 7d windows shift slowly; faster intervals just
# burn CPU without surfacing new information.
#
# Customisation
# -------------
# Edit the jq template below to change the format. To drop the 7d block,
# remove the `if .has_7d then " · 7d \(.percent_7d)%" else "" end` clause.
# To suppress the warning glyph, remove the trailing if-block.
#
# Failure behaviour
# -----------------
# If `ccpulse` is missing, errors, or the cache is empty, the segment
# renders as empty (no error string in the status bar). Same if `jq` is
# missing — the pipeline silently produces nothing.
#
# Future
# ------
# Once `ccpulse peek` ships (issue #99), the recipe collapses to:
#   set -ag status-right " #(ccpulse peek --brief) "
# No jq, no JSON parsing, native ANSI colours. This file becomes a
# one-line forwarder at that point.

set -g status-interval 30

set -ag status-right " #(ccpulse status --json 2>/dev/null | jq -r '\"5h \\(.percent)%\" + (if .has_7d then \" · 7d \\(.percent_7d)%\" else \"\" end) + (if .projection.five_hour.will_overreach then \" ⚠\" else \"\" end)') "
