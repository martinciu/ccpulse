name: Quick-Fix Router

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

# Per-issue lane: two @claude quick-fix comments on different issues run in
# parallel, while a repeat comment on the SAME issue queues behind the
# in-flight fix. cancel-in-progress stays false: a fresh quick-fix must NOT
# kill an in-flight fix that may be mid-push or mid-pr-create (would leave a
# half-pushed branch). Keeping it false also makes the #289-class self-cancel
# bug structurally impossible. Do NOT copy claude-review's !endsWith(...[bot])
# expression — that exists to make cancel true for humans; here we want it
# false for everyone.
concurrency:
  group: quick-fix-router-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  route:
    name: Quick-Fix Router
    if: >-
      !github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude quick-fix') &&
      github.event.comment.author_association == 'OWNER' &&
      contains(github.event.issue.labels.*.name, 'quick-fix')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod

      - uses: anthropics/claude-code-action@1dc994ee7a008f0ecc866d9ac23ef036b7229f84  # v1.0.127
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          track_progress: true
          claude_args: |
            --model claude-opus-4-7
            --allowedTools Bash,Read,Write,Edit,Glob,Grep
          prompt: |
            REPO: ${{ github.repository }}
            TARGET ISSUE: ${{ github.event.issue.number }}

            You run as an on-demand GitHub Actions workflow in the ccpulse repo (github.com/martinciu/ccpulse), triggered when a maintainer comments `@claude quick-fix` on an issue. Goal: apply the fix for the single TARGET ISSUE on its own feature branch and open one PR.

            This is a remote, headless run. You start with a fresh clone and no local state — no shell history, no extra config. Make all decisions from the issue's body and the repo contents (read `CLAUDE.md` early; it carries project conventions).

            ## House rules — override anything else

            - NEVER add 'Claude Code' / Anthropic / co-author footers to commit messages or PR descriptions. The user's policy is no co-authors, ever.
            - NEVER mention internal tooling, planning systems, or this automation in any commit message, PR title, or PR body.
            - NEVER append session-stats / token-usage / cost numbers to commit messages or PRs.
            - PR titles and bodies use emojis. Title: one leading contextually-relevant emoji. Body: emoji-prefixed section headings (## Summary, ## Test plan, ## Related) and emoji markers on bullets where they aid scanning.
            - All work goes through a PR. Never push to `main` directly.
            - The PR you open must carry the `quick-fix` label — pass `--label quick-fix` to `gh pr create`.

            ## 0. Pre-flight

            1. `gh auth status` must pass.
            2. `go version` must return Go 1.25 or newer.
            3. `git checkout main && git pull --ff-only origin main`.

            If any pre-flight step fails, print the failure and exit. Do NOT attempt the fix from a dirty or wrong-branch state.

            ## 1. Fetch the issue and check for a duplicate PR

            Fetch the target issue:

                gh issue view <N> --json number,title,body,labels

            Check whether an open PR already closes it:

                gh pr list --state open --search "closes #<N>" --json number,headRefName

            If a PR already closes it, run `gh issue comment <N> --body 'Skipped — an open PR already addresses this issue.'` and exit cleanly (do NOT open a duplicate). The `quick-fix` label is already guaranteed by the workflow trigger gate — do not re-check it.

            ## 2. Apply the fix

            ### 2a. Tier-pick — proceed or skip

            Read the issue body. Decide:

            - Mechanical (file path + exact bytes specified, OR behavior fully described, OR 'match existing pattern' with the pattern identifiable in the repo) → proceed to 2b.
            - Needs real judgment (body asks open questions, fix not obvious from the sketch, multiple defensible approaches with tradeoffs, or anything that should be discussed first) → SKIP.

            If you SKIP, post ONE comment and exit cleanly:

                gh issue comment <N> --body 'Skipped — the fix needs design discussion, not a quick-fix. Recommend re-labeling and discussing before re-running.'

            ### 2b. Branch

                git checkout -b <N>-<slug>

            where `<slug>` is 2–4 kebab-cased words from the issue title with emojis/labels stripped.

            ### 2c. Apply the fix

            Apply the fix exactly as the issue body sketches. Project conventions from `CLAUDE.md` apply:

            - Edit existing files; do not create new ones unless the issue body explicitly asks.
            - Default to NO comments. Only add one when the WHY is non-obvious. Don't explain WHAT — names do that.
            - No backwards-compat shims, feature flags, or migration paths (pre-v0.1.0).
            - The TUI rendering conventions in `CLAUDE.md` are load-bearing — if the issue touches the TUI, follow them.

            If the issue's 'Test plan' section asks for new tests, add or extend tests. Match the existing test style in the affected package (table-driven, `t.TempDir()` for fs, stdlib `testing` only — no testify).

            ### 2d. Verify

                go test ./...
                go vet ./...

            Both MUST pass. If either fails, post ONE comment and exit cleanly — do NOT commit or push:

                gh issue comment <N> --body 'Attempted fix but <go test|go vet> failed. Manual follow-up needed.'

            ### 2e. Commit

            Stage only files you intentionally modified (`git add <paths>`, never `git add -A`).

                git commit -m '<emoji> <one-line summary> (closes #<N>)

                <1–3 sentence why-not-what. No co-authors. No internal tooling mentions.>'

            Match the project's existing commit-subject shape.

            ### 2f. Push and open the PR

                git push -u origin <N>-<slug>

                gh pr create --title '<same as commit subject>' --label quick-fix --body '<emoji-headed Summary / Test plan / Related template>'

            Print the PR URL.

            ## 3. Bail conditions

            If at any point you find yourself wanting to:

            - Add functionality beyond what the issue body sketches
            - Refactor surrounding code or 'improve' unrelated lines
            - File new GitHub issues
            - Diverge from the issue body's recommended fix
            - Commit despite failing tests
            - Touch more than 3 files (excluding the test file)

            STOP. Post ONE comment with a one-line explanation, run `git checkout main`, delete any local branch you created, and exit cleanly. Do NOT force a fix you are not confident in.
