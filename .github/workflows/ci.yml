name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: '1.25'
      - run: go vet ./...
      - run: go test -race -coverprofile=coverage.out ./...
      - name: Check coverage threshold
        env:
          THRESHOLD: 70
        run: |
          pct=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          if [ -z "$pct" ]; then
            echo "::error::Could not parse coverage total from coverage.out"
            exit 1
          fi
          case "$pct" in
            *[!0-9.]*)
              echo "::error::Malformed coverage value: '$pct' (expected numeric)"
              exit 1
              ;;
          esac
          echo "Coverage: ${pct}% (threshold: ${THRESHOLD}%)"
          awk -v p="$pct" -v t="$THRESHOLD" 'BEGIN { exit !(p+0 >= t) }'

  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee  # v1.0.4
        with:
          go-version-file: go.mod
          go-package: ./...
