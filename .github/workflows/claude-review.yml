name: Claude Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read

# cancel-in-progress is gated to human comments: claude-code-action posts a
# progress comment (track_progress + sticky), which fires its own
# issue_comment event. Without this guard that event joins the group and
# cancels the very review that posted it. Bot comments never cancel; a fresh
# human @claude review still supersedes a stale in-progress one.
concurrency:
  group: claude-review-${{ github.event.issue.number }}
  cancel-in-progress: ${{ !endsWith(github.event.comment.user.login, '[bot]') }}

jobs:
  # Token-free producer. Fetches and materializes the Go review skills on a
  # runner that never receives CLAUDE_CODE_OAUTH_TOKEN, so a compromised
  # skills CLI or npm transitive dep cannot reach the credential or PR write
  # access. Source repo and CLI are both pinned. Dependabot cannot track a
  # cross-repo / run:-step ref, so bump these two values manually:
  #   source: samber/cc-skills-golang @ v1.5.0
  #   cli:    skills@1.5.7
  prepare-skills:
    name: Prepare Go skills
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    if: >-
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude review') &&
      github.event.comment.author_association == 'OWNER'
    steps:
      - name: Checkout pinned skills source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: samber/cc-skills-golang
          ref: 26e1d996a738d64ed112d1575079882ee8f39389  # v1.5.0
          path: cc-skills-golang
          persist-credentials: false
          fetch-depth: 1

      - name: Materialize Go skills with pinned CLI
        run: >-
          npx skills@1.5.7 add ./cc-skills-golang
          -a claude-code
          --skill golang-security
          --skill golang-error-handling
          --skill golang-concurrency
          --skill golang-database
          --skill golang-cli
          --skill golang-spf13-cobra
          --skill golang-testing
          --skill golang-performance
          -y --copy

      - name: Upload skills artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: claude-skills
          path: .claude/skills/
          retention-days: 1
          if-no-files-found: error

  review:
    name: Claude Review
    needs: prepare-skills
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 1

      - name: Download Go skills artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: claude-skills
          path: .claude/skills/

      - uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342  # v1.0.171
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          track_progress: true
          claude_args: >-
            --model claude-opus-4-7
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Skill"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.number }}

            You are a senior Go engineer reviewing a pull request for ccpulse,
            a terminal dashboard for Claude Code usage.

            Read the change first:
            - `gh pr diff` for the diff, `gh pr view` for description/metadata.
            - The PR branch is already checked out in the working directory.

            ## ccpulse-specific lenses (highest priority)

            - PRIVACY / slog: never log bearer/OAuth tokens, credential JSON,
              or raw HTTP bodies. Every new slog call site is a privacy surface
              — flag leaks of tokens, project paths, or response payloads.
            - TUI rendering: prefer lipgloss/bubbles/ntcharts primitives over
              hand-rolled width/padding math; lipgloss.Width over len().
            - Library line: ccpulse stays on the v1 majors of bubbletea/
              lipgloss/bubbles/ntcharts — flag any v2 import. Do NOT suggest
              new third-party libs (samber/*, testify, viper, DI frameworks).
            - Idiomatic Go: apply Skill("golang-security"),
              Skill("golang-error-handling"), Skill("golang-concurrency"),
              Skill("golang-database") for pkg/cache, Skill("golang-cli") +
              Skill("golang-spf13-cobra") for cmd/ccpulse, Skill("golang-testing"),
              Skill("golang-performance") for hot paths.

            Check project guidelines: @./CLAUDE.md

            ## How to report

            - mcp__github_inline_comment__create_inline_comment (confirmed: true)
              for each line-specific issue; include a ```suggestion block for
              direct 1:1 fixes.
            - `gh pr comment` only for a single top-level summary.
            - Name the problem, say when it bites, give a concrete fix.
            - Short comments. Only real issues — no praise, no nits gofmt
              handles. Verify the point wasn't already raised in a prior
              comment. Post nothing else; no chat output.

            Label severity:
            - 🔴 BLOCKING — definite bug, data race, privacy leak, security hole.
            - 🟠 IMPORTANT — significant risk under specific conditions.
            - 🟡 SUGGESTION — defensive or readability improvement.
